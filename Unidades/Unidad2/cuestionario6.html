<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuestionario - Semana 6</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    
body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    font-family: 'Segoe UI', Tahoma, sans-serif;
    color: #ffffff;
    margin: 0;
    padding: 0;
}

.container-main{
    max-width: 1150px;
    margin: auto;
}

.card-main{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 22px;
    padding: 30px;
    margin-bottom: 24px;
    box-shadow: 0 10px 28px rgba(0,0,0,.28);
    transition: .3s;
}

.card-main:hover{
    transform: translateY(-4px);
}

.badge-semana{
    display: inline-block;
    background: linear-gradient(135deg,#2196f3,#00bcd4);
    padding: 8px 18px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 16px;
}

.titulo{
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 10px;
}

.descripcion{
    color: #dce8f3;
    line-height: 1.8;
    font-size: 1.05rem;
}

.pregunta{
    font-size: 1.15rem;
    font-weight: 700;
    color: #7ec8ff;
    margin-bottom: 14px;
}

.respuesta{
    color: #e8f4ff;
    line-height: 1.8;
    font-size: 1rem;
}

pre{
    background: #0d1117;
    color: #7ee787;
    padding: 18px;
    border-radius: 16px;
    overflow-x: auto;
    font-size: 14px;
    line-height: 1.6;
    border: 1px solid rgba(255,255,255,.08);
    margin-top: 14px;
}

.btn-outline-primary{
    border-radius: 30px;
    padding: 10px 22px;
    font-weight: 700;
}

@media(max-width:768px){

    .card-main{
        padding: 22px;
    }

    .titulo{
        font-size: 1.45rem;
    }

    .pregunta{
        font-size: 1rem;
    }

    .respuesta{
        font-size: .95rem;
    }

    pre{
        font-size: 13px;
        padding: 14px;
    }

}
</style>

</head>
<body>
    
</body>
</html>
