<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resumen - Semana 3</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    font-family:'Segoe UI',Tahoma,sans-serif;
    color:white;
}

.container-main{
    max-width:1100px;
}

.card-main{
    background: rgba(255,255,255,0.06);
    border-radius:18px;
    padding:30px;
    backdrop-filter: blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

.badge-semana{
    background:#2196f3;
    padding:8px 16px;
    border-radius:20px;
    font-size:14px;
    display:inline-block;
    margin-bottom:15px;
}

.titulo{
    font-weight:800;
    margin-bottom:10px;
}

.descripcion{
    color:#cfd8dc;
}

.img-card{
    background: rgba(255,255,255,0.08);
    border-radius:15px;
    padding:15px;
    height:100%;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.img-card img{
    width:100%;
    border-radius:12px;
    transition:0.3s;
}

.img-card img:hover{
    transform:scale(1.02);
}

.img-title{
    color:#90caf9;
    font-weight:700;
    margin-bottom:15px;
    text-align:center;
}

.btn-custom{
    background:#2196f3;
    color:white;
    border:none;
    border-radius:25px;
    padding:10px 18px;
    font-weight:600;
    text-decoration:none;
}

.btn-custom:hover{
    background:#42a5f5;
    color:white;
}

@media(max-width:768px){
    .card-main{
        padding:20px;
    }
}
</style>
</head>

<body>

<div class="container container-main py-5">

    <a href="semana3.html" class="btn btn-outline-primary mb-4">← Volver</a>

    <div class="card-main">

        <div class="badge-semana">📘 Semana 3</div>

        <h2 class="titulo">Resumen Visual</h2>

        <p class="descripcion mb-5">
            En esta sección se presentan esquemas gráficos desarrollados sobre
            arquitecturas de bases de datos y modelado de datos con niveles de abstracción.
        </p>

        <div class="row g-4">

            <div class="col-md-6">
                <div class="img-card">
                    <h5 class="img-title">
                        Introducción a las Arquitecturas de Base de Datos
                    </h5>

                    <img src="../../assets/img/semanas/semana3diagrama1.png" alt="Arquitecturas BD">
                </div>
            </div>

            <div class="col-md-6">
                <div class="img-card">
                    <h5 class="img-title">
                        Modelado de Datos y Niveles de Abstracción
                    </h5>

                    <img src="../../assets/img/semanas/semana3diagrama2.png" alt="Modelado de Datos">
                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
