<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Portafolio BD II</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(180deg, #eef6fb 0%, #dfeff7 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .register-header {
            width: 100%;
            background: #fff;
            border-bottom: 5px solid #0d6efd;
        }

        .register-header img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .register-box {
            background: #fff;
            padding: 35px;
            border-radius: 18px;
            border: 2px solid #1f1f1f;
            box-shadow: 0 12px 30px rgba(0,0,0,0.18);
        }

        .register-box h4 {
            font-weight: 700;
            margin-bottom: 25px;
        }

        .form-control {
            border-radius: 10px;
            padding: 10px;
            border: 2px solid #444;
        }

        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.15rem rgba(13,110,253,0.25);
        }

        .btn-register {
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(13,110,253,0.35);
        }
    </style>
</head>

<body>

<header class="register-header">
    <img src="../assets/img/login-banner.png" alt="Banner">
</header>

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="register-box">

                <h4 class="text-center">Crear Cuenta</h4>

                <form>

                    <div class="mb-3">
                        <label class="form-label">Nombre completo</label>
                        <input type="text" class="form-control" placeholder="Tu nombre">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" placeholder="ejemplo@correo.com">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control" placeholder="********">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirmar contraseña</label>
                        <input type="password" class="form-control" placeholder="********">
                    </div>

                    <div class="d-grid mt-3">
                        <button type="submit" class="btn btn-register text-white">
                            Registrarse
                        </button>
                    </div>

                </form>

                <div class="text-center mt-4">
                    <small>
                        ¿Ya tienes cuenta?
                        <a href="login.html">Inicia sesión</a>
                    </small>
                </div>

                <div class="text-center mt-3">
                    <a href="../index.html" class="text-muted">← Volver al inicio</a>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
