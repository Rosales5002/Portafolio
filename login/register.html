<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Portafolio BD II</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #fff;
        }

        .register-container {
            max-width: 420px;
            margin: 80px auto;
        }

        .card-register {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .titulo {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .form-control {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: #ccc;
        }

        .btn-custom {
            background: #2196f3;
            border: none;
            font-weight: 600;
        }

        .btn-custom:hover {
            background: #42a5f5;
        }

        .volver {
            text-align: center;
            margin-top: 15px;
        }

        a {
            color: #90caf9;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="register-container">

    <div class="card-register">

        <h3 class="titulo">📝 Registrarse</h3>

        <input type="text" id="usuario" class="form-control mb-3" placeholder="Usuario" required>

        <input type="email" id="correo" class="form-control mb-3" placeholder="Correo electrónico" required>

        <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña" required>

        <input type="password" id="confirmar" class="form-control mb-3" placeholder="Confirmar contraseña" required>

        <button onclick="register()" class="btn btn-custom w-100">
            Registrarse
        </button>

        <div class="volver">
            <a href="../index.html">← Volver al inicio</a>
        </div>

    </div>

</div>

<script>
function register() {
    let usuario = document.getElementById("usuario").value;
    let correo = document.getElementById("correo").value;
    let password = document.getElementById("password").value;
    let confirmar = document.getElementById("confirmar").value;

    if (!usuario || !correo || !password || !confirmar) {
        alert("Completa todos los campos");
        return;
    }

    if (password !== confirmar) {
        alert("Las contraseñas no coinciden");
        return;
    }

    localStorage.setItem("usuario", usuario);

    window.location.href = "../index.html";
}
</script>

</body>
</html>
