<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portafolio BD II</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="assets/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        .hero {
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .btn-custom {
            padding: 12px 25px;
            border-radius: 10px;
        }

        .card {
            border-radius: 12px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .modal-content {
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
                from {
            transform: translateY(30px);
            opacity: 0;
            }
        to {
            transform: translateY(0);
            opacity: 1;
            }
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

    <a class="navbar-brand d-flex align-items-center fw-bold" href="#">

        <img src="assets/img/UplaF.png" 
             alt="Logo UPLA" 
             width="40" 
             height="40" 
             class="me-2">

        JOSMEL ROSALES
    </a>

    <div class="ms-auto">

        <span id="usuarioLogeado" class="text-white ms-3"></span>

        <a href="login/login.html" class="btn btn-outline-light me-2">
            Iniciar Sesión
        </a>

        <a href="login/register.html" class="btn btn-primary">
            Registrarse
        </a>
    </div>
</nav>

<div class="hero">
    <div>
        <h1 class="display-4 fw-bold">Josmel Rosales Quispe</h1>

        <p class="lead mt-3">
            Portafolio Académico - Base de Datos II<br>
            5° Ciclo - Universidad Peruana de Los Andes
        </p>

        <div class="mt-4">
            <button class="btn btn-info btn-custom me-2" data-bs-toggle="modal" data-bs-target="#modalUnidades">
                Explorar Unidades
            </button>
        </div>
    </div>
</div>

<div class="modal fade" id="modalUnidades" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content" style="background: #1e2a38; color: white; border-radius: 15px;">

      <div class="modal-header border-0">
        <h5 class="modal-title">Unidades del Curso</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div class="row g-4 text-center">

          <div class="col-md-3">
            <a href="Unidades/Unidad1/index.html" class="text-decoration-none">
              <div class="card p-3 shadow-sm" style="background:#263544; color:white;">
                <h5>Unidad 1</h5>
                <small>Semanas 1 - 4</small>
              </div>
            </a>
          </div>

          <div class="col-md-3">
            <a href="Unidades/Unidad2/index.html" class="text-decoration-none">
              <div class="card p-3 shadow-sm" style="background:#263544; color:white;">
                <h5>Unidad 2</h5>
                <small>Semanas 5 - 8</small>
              </div>
            </a>
          </div>

          <div class="col-md-3">
            <a href="Unidades/Unidad3/index.html" class="text-decoration-none">
              <div class="card p-3 shadow-sm" style="background:#263544; color:white;">
                <h5>Unidad 3</h5>
                <small>Semanas 9 - 12</small>
              </div>
            </a>
          </div>

          <div class="col-md-3">
            <a href="Unidades/Unidad4/index.html" class="text-decoration-none">
              <div class="card p-3 shadow-sm" style="background:#263544; color:white;">
                <h5>Unidad 4</h5>
                <small>Semanas 13 - 16</small>
              </div>
            </a>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<script src="assets/js/bootstrap.bundle.min.js"></script>

<script>

let usuario = localStorage.getItem("usuario");

if (usuario) {
    document.getElementById("usuarioLogeado").innerText = "👤 " + usuario;
}
</script>

</body>
</html>
